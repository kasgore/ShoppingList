# Family Shopping List — docker compose stack.
#
# Deploy via Portainer Stacks:
#   1. Stacks → Add stack → Name "shoppinglist"
#   2. Build method: Repository (point at your git repo) OR Web editor
#      with the contents of this file IF the image is built elsewhere.
#   3. Deploy.
#
# After deploy, browse to http://<docker-host-ip>:5000 and add to your
# iPhone home screen.

services:
  shoppinglist:
    container_name: shoppinglist
    # Build the image locally on the Docker host from the Dockerfile in
    # this repo. Portainer Stacks → Repository clones the repo, runs
    # `docker compose up`, which triggers the build. The explicit
    # lowercase `image:` tag is required because Docker rejects derived
    # tag names that contain capitals (the repo is "ShoppingList").
    build: .
    image: shoppinglist:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Set this to a long random string in production. Used for Flask
      # flash messages — not a security boundary, but should not be
      # left as the default.
      SHOPPINGLIST_SECRET: "change-me-to-a-long-random-string"
    volumes:
      # SQLite database lives here so it survives container rebuilds.
      - shoppinglist-data:/data
      # Photos uploaded from phones live here.
      - shoppinglist-uploads:/app/static/uploads
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; \
              sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/manifest.json',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - shoppinglist-net

volumes:
  shoppinglist-data:
  shoppinglist-uploads:

networks:
  # Explicit subnet so Portainer environments that auto-assign endpoint
  # IPs to containers don't fail the bridge with "user specified IP
  # address is supported only when connecting to networks with user
  # configured subnets".
  shoppinglist-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
