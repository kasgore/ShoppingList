# Family Shopping List — docker compose stack.
#
# Deploy via Portainer Stacks:
#   1. Stacks → Add stack → Name "shoppinglist"
#   2. Build method: Repository (point at your git repo) OR Web editor
#      with the contents of this file IF the image is built elsewhere.
#   3. Deploy.
#
# After deploy, browse to http://<docker-host-ip>:5000 and add to your
# iPhone home screen.

services:
  shoppinglist:
    container_name: shoppinglist
    build: .
    image: shoppinglist:latest
    restart: unless-stopped
    environment:
      # Set this to a long random string in production. Used for Flask
      # flash messages — not a security boundary, but should not be
      # left as the default.
      SHOPPINGLIST_SECRET: "change-me-to-a-long-random-string"
    volumes:
      - shoppinglist-data:/data
      - shoppinglist-uploads:/app/static/uploads
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; \
              sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:80/manifest.json',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Allow the non-root `app` user to bind to port 80 inside the container.
    sysctls:
      net.ipv4.ip_unprivileged_port_start: 0
    networks:
      lan:
        # Static LAN IP for the container. Reach the app at
        # http://192.168.5.7  (no port suffix needed — port 80).
        ipv4_address: 192.168.5.7

volumes:
  shoppinglist-data:
  shoppinglist-uploads:

networks:
  # macvlan: gives the container its own MAC + IP on the home LAN, so
  # 192.168.5.7 is reachable from phones/laptops directly (not through
  # the Docker host). Edit `parent:` to match your host's NIC if eth0
  # is wrong (`ip link` lists candidates), and adjust subnet/gateway
  # to match your actual home network.
  lan:
    driver: macvlan
    driver_opts:
      parent: eth0
    ipam:
      config:
        - subnet: 192.168.5.0/24
          gateway: 192.168.5.1
