# Family Shopping List — docker compose stack.
#
# Deploy via Portainer Stacks:
#   1. Stacks → Add stack → Name "shoppinglist"
#   2. Build method: Repository (point at your git repo) OR Web editor
#      with the contents of this file IF the image is built elsewhere.
#   3. Deploy.
#
# After deploy, browse to http://<docker-host-ip>:5000 and add to your
# iPhone home screen.

services:
  shoppinglist:
    container_name: shoppinglist
    build: .
    image: shoppinglist:latest
    restart: unless-stopped
    environment:
      SHOPPINGLIST_SECRET: "change-me-to-a-long-random-string"
      # SEED_MODE controls how seed_data/ is applied to the volumes:
      #   always  overwrite from baked-in seed on every container start
      #           (good while iterating: local edits → push → redeploy
      #           → Portainer matches local exactly)
      #   auto    seed only when the volume is empty (first deploy / wipe)
      #   never   leave volumes alone
      # Flip this to "auto" once the family is using the deployed app
      # so their additions don't get clobbered on every redeploy.
      SEED_MODE: "always"
    volumes:
      - shoppinglist-data:/data
      - shoppinglist-uploads:/app/static/uploads
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; \
              sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:80/manifest.json',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Allow the non-root `app` user to bind to port 80 inside the container.
    sysctls:
      net.ipv4.ip_unprivileged_port_start: 0
    networks:
      InternalNetwork:
        # Container's static IP on the home LAN. Reachable directly at
        # http://192.168.5.7  from any other device on the network.
        ipv4_address: 192.168.5.7

volumes:
  shoppinglist-data:
  shoppinglist-uploads:

networks:
  # Re-use the pre-existing macvlan network already configured on this
  # Docker host (subnet 192.168.5.0/24, gateway 192.168.5.1, parent NIC
  # set up out-of-band). `external: true` tells compose not to create
  # or modify it — just attach to it.
  InternalNetwork:
    external: true
