name: Build & publish container image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          # amd64 covers most x86 servers, arm64 covers Pi 4/5 + Apple silicon.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kasgore/shoppinglist:latest
            ghcr.io/kasgore/shoppinglist:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
