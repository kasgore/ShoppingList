<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}Kasa{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <!-- PWA: installable on iOS/Android home screen. -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2f7d32">
  <meta name="application-name" content="Kasa">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kasa">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-180.png') }}">
  <link rel="icon" type="image/png" sizes="192x192"
        href="{{ url_for('static', filename='icons/icon-192.png') }}">
</head>
<body>
  <header class="topbar">
    <button id="menu-toggle" class="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <div class="brand">
      <a href="{{ url_for('index') }}">
        <svg class="brand-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 4c0 1.2.8 2 2 2 .8 0 1-.4 1-1 0-1-.5-1.5-.5-2.2 0-.4.2-.8.5-.8m3 1c0 1.2.8 2 2 2 .8 0 1-.4 1-1 0-1-.5-1.5-.5-2.2 0-.4.2-.8.5-.8m3 1c0 1.2.8 2 2 2 .8 0 1-.4 1-1 0-1-.5-1.5-.5-2.2 0-.4.2-.8.5-.8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <rect x="3" y="10" width="18" height="9" rx="2" fill="currentColor"/>
          <rect x="2" y="9" width="20" height="2" rx="1" fill="currentColor"/>
          <circle cx="6" cy="14.5" r="0.9" fill="#fff" opacity=".85"/>
          <circle cx="9.5" cy="14.5" r="0.9" fill="#fff" opacity=".85"/>
          <circle cx="13" cy="14.5" r="0.9" fill="#fff" opacity=".85"/>
        </svg>
        <span>Kasa</span>
      </a>
    </div>
    <span class="topbar-spacer"></span>
  </header>

  <div id="menu-overlay" class="menu-overlay" hidden></div>
  <nav id="side-menu" class="side-menu" aria-hidden="true">
    <div class="side-menu-header">
      <strong>Menu</strong>
      <button id="menu-close" class="link" aria-label="Close menu">×</button>
    </div>
    <a href="{{ url_for('index') }}">Plan &amp; Shop</a>
    <a href="{{ url_for('recipes_page') }}">Recipes</a>
    <a href="{{ url_for('recipe_new') }}">New Recipe</a>
  </nav>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flashes">
        {% for category, msg in messages %}
          <div class="flash flash-{{ category }}">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <small>Pick recipes, add anything else, shop happy.</small>
  </footer>

  <!-- Pre-loaded alarm sound. Played by the timer JS when a countdown
       finishes; iOS will only play it after the user has tapped the page
       at least once (a Safari restriction on autoplay). -->
  <audio id="timer-alarm" preload="auto" playsinline
         src="{{ url_for('static', filename='beep.wav') }}"></audio>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
